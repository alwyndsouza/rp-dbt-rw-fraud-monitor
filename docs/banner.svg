<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rp" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e84142;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b52e2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rw" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e88e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565c0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gf" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f46800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c45200;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#30363d"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="100" x2="900" y2="100" stroke="#21262d" stroke-width="1"/>
  <line x1="450" y1="0" x2="450" y2="200" stroke="#21262d" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="200" fill="#e84142" rx="2"/>

  <!-- Title -->
  <text x="52" y="62" font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="26" font-weight="700" fill="#f0f6fc" letter-spacing="-0.5">
    Real-Time Fraud Detection
  </text>

  <!-- Subtitle -->
  <text x="54" y="90" font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="13" fill="#8b949e" letter-spacing="0.3">
    Streaming pipeline · Sub-300ms signal latency · 7 fraud patterns
  </text>

  <!-- Divider -->
  <line x1="52" y1="106" x2="440" y2="106" stroke="#21262d" stroke-width="1"/>

  <!-- Live indicator -->
  <circle cx="58" cy="132" r="5" fill="#3fb950" filter="url(#glow)"/>
  <text x="70" y="137" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="12" fill="#3fb950" font-weight="600" letter-spacing="0.5">LIVE</text>

  <!-- Stats row -->
  <text x="110" y="137" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="12" fill="#8b949e">
    <tspan fill="#f0f6fc" font-weight="600">6</tspan> topics ·
    <tspan fill="#f0f6fc" font-weight="600">18</tspan> materialized views ·
    <tspan fill="#f0f6fc" font-weight="600">&lt;300ms</tspan> latency
  </text>

  <!-- Tech stack label -->
  <text x="52" y="170" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="11" fill="#8b949e" letter-spacing="0.8" text-transform="uppercase">
    STACK
  </text>

  <!-- Redpanda pill -->
  <rect x="100" y="156" width="100" height="26" rx="6" fill="url(#rp)" filter="url(#shadow)"/>
  <text x="150" y="174" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="0.2">
    ⚡ Redpanda
  </text>

  <!-- Arrow 1 -->
  <line x1="204" y1="169" x2="222" y2="169" stroke="#30363d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- RisingWave pill -->
  <rect x="225" y="156" width="115" height="26" rx="6" fill="url(#rw)" filter="url(#shadow)"/>
  <text x="282" y="174" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="0.2">
    🌊 RisingWave
  </text>

  <!-- Arrow 2 -->
  <line x1="344" y1="169" x2="362" y2="169" stroke="#30363d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Grafana pill -->
  <rect x="365" y="156" width="90" height="26" rx="6" fill="url(#gf)" filter="url(#shadow)"/>
  <text x="410" y="174" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="0.2">
    📊 Grafana
  </text>

  <!-- Right panel: Signal cards -->
  <rect x="470" y="20" width="410" height="160" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1"/>

  <text x="490" y="44" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="11" fill="#8b949e" letter-spacing="1" font-weight="600">FRAUD SIGNALS</text>

  <!-- Signal badges - row 1 -->
  <rect x="490" y="52" width="90" height="20" rx="4" fill="#1f2b1f" stroke="#3fb950" stroke-width="1"/>
  <text x="535" y="66" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="10" fill="#3fb950" text-anchor="middle">Velocity</text>

  <rect x="590" y="52" width="100" height="20" rx="4" fill="#1f2b1f" stroke="#3fb950" stroke-width="1"/>
  <text x="640" y="66" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="10" fill="#3fb950" text-anchor="middle">Geo Impossible</text>

  <rect x="700" y="52" width="110" height="20" rx="4" fill="#2b1f1f" stroke="#f85149" stroke-width="1"/>
  <text x="755" y="66" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="10" fill="#f85149" text-anchor="middle">Device Anomaly</text>

  <!-- Signal badges - row 2 -->
  <rect x="490" y="80" width="85" height="20" rx="4" fill="#2b1f1f" stroke="#f85149" stroke-width="1"/>
  <text x="532" y="94" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="10" fill="#f85149" text-anchor="middle">CNP Spike</text>

  <rect x="585" y="80" width="100" height="20" rx="4" fill="#2b1f1f" stroke="#f85149" stroke-width="1"/>
  <text x="635" y="94" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="10" fill="#f85149" text-anchor="middle">Brute Force</text>

  <rect x="695" y="80" width="90" height="20" rx="4" fill="#2b1c0a" stroke="#e3b341" stroke-width="1"/>
  <text x="740" y="94" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="10" fill="#e3b341" text-anchor="middle">Structuring</text>

  <!-- Signal badges - row 3 -->
  <rect x="490" y="108" width="120" height="20" rx="4" fill="#2b1c0a" stroke="#e3b341" stroke-width="1"/>
  <text x="550" y="122" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="10" fill="#e3b341" text-anchor="middle">Compound Fraud</text>

  <!-- Divider in right panel -->
  <line x1="490" y1="140" x2="860" y2="140" stroke="#21262d" stroke-width="1"/>

  <!-- Risk score indicator -->
  <text x="490" y="158" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="11" fill="#8b949e">Risk Score</text>

  <!-- Score bar background -->
  <rect x="560" y="148" width="200" height="12" rx="6" fill="#21262d"/>
  <!-- Score bar fill -->
  <rect x="560" y="148" width="140" height="12" rx="6" fill="#e84142"/>
  <text x="768" y="159" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="11" fill="#f85149" font-weight="700">0.70  HIGH</text>
</svg>
