version: 2

models:
  - name: mv_open_fraud_cases
    description: >
      Active fraud investigation cases for accounts in the HIGH or CRITICAL
      risk tier. Includes recommended_action (escalate, freeze_account,
      block_card, or monitor) derived from risk score and KYC tier.

  - name: mv_resolved_cases_today
    description: >
      Accounts whose risk score has fallen below 0.3, indicating resolved
      or normalised cases. Used for analyst performance metrics.

  - name: mv_recent_high_alerts
    description: >
      High and critical severity alerts fired in the last 30 minutes,
      enriched with the customer's current KYC tier and status.
