version: 2

models:
  - name: stg_transactions
    description: >
      Parsed transactions with timestamp cast to TIMESTAMPTZ and derived
      indicator columns (is_cnp, is_odd_hours, is_high_risk_mcc).

  - name: stg_login_events
    description: >
      Parsed login events with timestamp cast to TIMESTAMPTZ.

  - name: stg_card_events
    description: >
      Parsed card lifecycle events with timestamp cast to TIMESTAMPTZ.

  - name: stg_alert_events
    description: >
      Parsed alert events with timestamp cast to TIMESTAMPTZ and numeric
      severity_weight column added.

  - name: stg_kyc_profiles
    description: >
      Parsed KYC profile events with timestamp cast to TIMESTAMPTZ.

  - name: mv_latest_kyc
    description: >
      Latest KYC profile per customer using DISTINCT ON to implement
      last-write-wins semantics ordered by updated_at DESC.
