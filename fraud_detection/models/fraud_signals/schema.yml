version: 2

models:
  - name: mv_velocity_alerts
    description: >
      Detects velocity fraud: accounts with 5+ transactions in a rolling
      60-second TUMBLE window.

  - name: mv_geo_impossible_trips
    description: >
      Detects geographic impossibility: consecutive transactions more than
      1000 km apart occurring within 2 hours using LAG() window functions.

  - name: mv_known_customer_devices
    description: >
      Helper view tracking all devices seen per customer with first/last
      seen timestamps. Used by mv_device_anomalies.

  - name: mv_device_anomalies
    description: >
      Detects account takeover: high-value (> $500) card-not-present
      transactions from devices not seen in the prior 24h–30d window.

  - name: mv_cnp_spike
    description: >
      Detects CNP fraud: cards with 8+ card-not-present transactions in a
      5-minute TUMBLE window.

  - name: mv_login_failure_storm
    description: >
      Detects brute-force login attempts: 3+ failed logins from a single
      customer in a 60-second TUMBLE window.

  - name: mv_structuring_detection
    description: >
      Detects AML structuring / smurfing: 2+ transactions between $9,000
      and $9,999 within a 60-minute TUMBLE window, targeting the AUSTRAC
      AUD $10,000 reporting threshold.

  - name: mv_correlated_alert_burst
    description: >
      Detects compound fraud: 2+ distinct alert types fired for a single
      customer within a 5-minute TUMBLE window.

  - name: mv_network_analysis
    description: >
      Detects synthetic identity rings: a single device used by 2+ distinct
      customers within a 60-minute TUMBLE window.
