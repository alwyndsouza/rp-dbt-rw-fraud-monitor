version: 2

models:
  - name: transactions
    description: >
      Kafka source ingesting raw transaction events from the 'transactions'
      Redpanda topic. Fields arrive as JSON; VARCHAR timestamps are cast in
      the staging layer.

  - name: login_events
    description: >
      Kafka source ingesting raw login events from the 'login_events'
      Redpanda topic.

  - name: card_events
    description: >
      Kafka source ingesting card lifecycle events (freeze, replace, etc.)
      from the 'card_events' Redpanda topic.

  - name: alert_events
    description: >
      Kafka source ingesting reactive fraud alerts from the 'alert_events'
      Redpanda topic.

  - name: kyc_profile_events
    description: >
      Kafka source ingesting KYC profile updates from the
      'kyc_profile_events' Redpanda topic.
